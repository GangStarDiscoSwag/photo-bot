<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Выпадайло v1.2</title>

    <!-- Telegram WebApp SDK & Confetti -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- ========================================== -->
    <!-- ===== БЛОК 1: ОСНОВНЫЕ СТИЛИ И СБРОС ===== -->
    <!-- ========================================== -->
    <style>
        :root {
            --bg-color: #0c0214;
            --card-bg: #160d26;
            --accent-glow: #00ffff;
            --pink-accent: #ff007f;
            --purple-accent: #a824e8;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            perspective: 1000px;
            position: relative;
        }

        /* ========================================== */
        <!-- ===== БЛОК 2: АНИМИРОВАННЫЙ ЗАДНИЙ ФОН ==== -->
        /* ========================================== */
        .bg-glow-main {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(168, 36, 232, 0.45) 0%, rgba(255, 0, 127, 0.25) 45%, rgba(12, 2, 20, 0.95) 90%);
            animation: pulseBg 6s ease-in-out infinite alternate;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.15); opacity: 1; }
        }

        /* ========================================== */
        <!-- ===== БЛОК 3: ЭКРАН 1 (ПРИВЕТСТВИЕ) ======= -->
        /* ========================================== */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            text-align: center;
            position: absolute;
            inset: 0;
        }

        .welcome-screen.hidden {
            display: none !important;
        }

        .welcome-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--pink-accent), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 35px rgba(0, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 45px;
        }

        .btn-start-main {
            width: 85%;
            max-width: 280px;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 0, 126, 0.5);
            transition: transform 0.15s;
        }

        .btn-start-main:active { transform: scale(0.95); }

        .version-start {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            z-index: 10;
        }

        /* ========================================== */
        <!-- ===== БЛОК 4: ЭКРАН 2 (ИГРА И КАРТОЧКА) ==== -->
        /* ========================================== */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            gap: 20px;
            position: absolute;
            inset: 0;
            padding: 20px;
        }

        .game-screen.active {
            display: flex;
        }

        /* Заголовок */
        .header-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #e6007e 0%, #a824e8 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: textGlowFlow 4s linear infinite;
            text-align: center;
        }

        @keyframes textGlowFlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        /* Плашка загрузки */
        .upload-box {
            width: 90%;
            max-width: 320px;
            height: 90px;
            background: rgba(26, 12, 42, 0.65);
            border: 2px dashed rgba(168, 36, 232, 0.85);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168, 36, 232, 0.25);
            transition: background 0.2s, transform 0.15s;
        }

        .upload-box:active {
            transform: scale(0.98);
            background: rgba(168, 36, 232, 0.25);
        }

        .upload-box p {
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Оболочка Карточки */
        .card-wrapper {
            position: relative;
            width: 270px;
            height: 350px;
            display: none;
        }

        /* Свечение ЗА картинкой */
        .card-back-glow {
            position: absolute;
            inset: -10px;
            border-radius: 30px;
            background: linear-gradient(45deg, #00ffff, #ff007f, #a824e8);
            filter: blur(18px);
            opacity: 0.7;
            z-index: 1;
        }

        .card-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            z-index: 2;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            overflow: hidden;
            position: relative;
        }

        .card img {
            width: 120%;
            height: 120%;
            object-fit: cover;
            position: absolute;
            top: -10%;
            left: -10%;
            will-change: transform;
        }

        /* Диагональный блик */
        .glint {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg, 
                rgba(255, 255, 255, 0.4) 0%, 
                rgba(255, 255, 255, 0.08) 40%, 
                transparent 65%
            );
            pointer-events: none;
            z-index: 3;
            border-radius: 24px;
        }

        /* ВЫЛЕТАЮЩИЕ КУБИКИ (Затухание по мере отдаления) 🎲 */
        .dice-particle {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            filter: drop-shadow(0 0 6px rgba(0,0,0,0.8));
            animation: flyDiceFade 0.6s ease-out forwards;
        }

        @keyframes flyDiceFade {
            0% { 
                opacity: 1; 
                transform: translate(0, 0) rotate(0deg) scale(0.6); 
            }
            100% { 
                opacity: 0; /* Прозрачность падает до нуля! */
                transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(1.5); 
            }
        }

        /* Фильтры */
        .filter-cyberpunk { filter: contrast(1.35) saturate(1.9) hue-rotate(-20deg); }
        .filter-matrix { filter: sepia(1) hue-rotate(80deg) saturate(3.5) contrast(1.25); }
        .filter-retro { filter: sepia(0.45) contrast(1.15) brightness(0.9) saturate(1.4); }
        .filter-neon { filter: invert(0.12) hue-rotate(180deg) saturate(2.2); }
        .filter-noir { filter: grayscale(1) contrast(1.9) brightness(0.75); }
        .filter-gold { filter: sepia(0.85) saturate(2.8) contrast(1.25) brightness(1.15); }

        /* ========================================== */
        <!-- ===== БЛОК 5: КНОПКИ УПРАВЛЕНИЯ =========== -->
        /* ========================================== */
        .controls {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }

        .btn-spin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.45);
            transition: transform 0.1s;
        }

        .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-reset {
            display: none;
            width: 100%;
            padding: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reset:active { background: rgba(255, 255, 255, 0.18); color: #fff; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="bg-glow-main"></div>

    <!-- ЭКРАН 1: Приветствие -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-title">ВЫПАДАЙЛО</div>
        <div class="welcome-subtitle">испытай удачу</div>
        <button class="btn-start-main" id="startMainBtn">Начать</button>
        <div class="version-start">Выпадайло v1.2</div>
    </div>

    <!-- ЭКРАН 2: Игровой интерфейс -->
    <div class="game-screen" id="gameScreen">
        <div class="header-title" id="gameHeader">ЗАГРУЗИ ФОТО</div>

        <!-- Плашка загрузки -->
        <div class="upload-box" id="uploadBox">
            <p>📸 Выберите фото из галереи</p>
        </div>

        <!-- Карточка -->
        <div class="card-wrapper" id="cardWrapper">
            <div class="card-back-glow"></div>
            <div class="card-container" id="cardContainer">
                <div class="card" id="card">
                    <div class="glint" id="glint"></div>
                    <img id="userPhoto" alt="Photo">
                </div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="controls" id="controlsBox" style="display: none;">
            <button class="btn-spin" id="spinBtn">🎲 Крутить рулетку</button>
            <button class="btn-reset" id="resetBtn">Заново</button>
        </div>

        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- ========================================== -->
    <!-- ===== БЛОК 6: ЛОГИКА JS И ГИРОСКОП ======== -->
    <!-- ========================================== -->
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const welcomeScreen = document.getElementById('welcomeScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startMainBtn = document.getElementById('startMainBtn');
        const gameHeader = document.getElementById('gameHeader');
        const uploadBox = document.getElementById('uploadBox');
        const cardWrapper = document.getElementById('cardWrapper');
        const cardContainer = document.getElementById('cardContainer');
        const controlsBox = document.getElementById('controlsBox');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fileInput = document.getElementById('fileInput');
        const userPhoto = document.getElementById('userPhoto');
        const card = document.getElementById('card');

        let isPhotoLoaded = false;
        let audioCtx = null;

        let currentTiltX = 0, currentTiltY = 0;
        let targetTiltX = 0, targetTiltY = 0;

        const filters = ['filter-cyberpunk', 'filter-matrix', 'filter-retro', 'filter-neon', 'filter-noir', 'filter-gold'];

        uploadBox.addEventListener('click', () => fileInput.click());

        function playStartSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(659.25, now + 0.15);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.45);
        }

        startMainBtn.addEventListener('click', () => {
            initAudio();
            playStartSound();
            welcomeScreen.classList.add('hidden');
            gameScreen.classList.add('active');
        });

        resetBtn.addEventListener('click', () => {
            gameScreen.classList.remove('active');
            welcomeScreen.classList.remove('hidden');
            gameHeader.innerText = 'ЗАГРУЗИ ФОТО';
            uploadBox.style.display = 'flex';
            cardWrapper.style.display = 'none';
            controlsBox.style.display = 'none';
            resetBtn.style.display = 'none';
            isPhotoLoaded = false;
            userPhoto.src = '';
            fileInput.value = '';
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        // Вылет кубиков с затуханием прозрачности
        function spawnDice() {
            const dice = document.createElement('div');
            dice.className = 'dice-particle';
            dice.innerText = '🎲';
            const dx = (Math.random() - 0.5) * 240 + 'px';
            const dy = (Math.random() - 0.5) * 240 + 'px';
            dice.style.setProperty('--dx', dx);
            dice.style.setProperty('--dy', dy);
            dice.style.left = '50%';
            dice.style.top = '50%';
            cardContainer.appendChild(dice);
            setTimeout(() => dice.remove(), 600);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userPhoto.src = event.target.result;
                    uploadBox.style.display = 'none';
                    cardWrapper.style.display = 'block';
                    controlsBox.style.display = 'flex';
                    isPhotoLoaded = true;
                    startRoulette();
                };
                reader.readAsDataURL(file);
            }
        });

        spinBtn.addEventListener('click', () => {
            initAudio();
            if (isPhotoLoaded) startRoulette();
        });

        function startRoulette() {
            spinBtn.disabled = true;
            resetBtn.style.display = 'none';
            gameHeader.innerText = 'ВЫПАДАЙЛО';

            let speed = 40;
            let ticks = 0;
            const maxTicks = 22 + Math.floor(Math.random() * 8);

            function roll() {
                const randomFilter = filters[Math.floor(Math.random() * filters.length)];
                card.className = 'card ' + randomFilter;
                playTickSound();
                spawnDice();

                ticks++;
                if (ticks < maxTicks) {
                    speed += 14;
                    setTimeout(roll, speed);
                } else {
                    finishRoulette();
                }
            }
            roll();
        }

        function finishRoulette() {
            spinBtn.disabled = false;
            spinBtn.innerText = '🎲 Прокрутить ещё раз';
            resetBtn.style.display = 'block';

            if (typeof confetti === 'function') {
                confetti({ particleCount: 80, spread: 70, origin: { y: 0.65 } });
            }
        }

        // Гироскоп
        window.addEventListener('deviceorientation', (e) => {
            if (e.gamma === null || e.beta === null) return;
            targetTiltX = Math.max(-18, Math.min(18, e.gamma / 1.8));
            const betaAdjusted = e.beta - 35;
            targetTiltY = Math.max(-18, Math.min(18, betaAdjusted / 1.8));
        });

        function animateTilt() {
            if (isPhotoLoaded) {
                currentTiltX += (targetTiltX - currentTiltX) * 0.12;
                currentTiltY += (targetTiltY - currentTiltY) * 0.12;

                cardContainer.style.transform = `rotateY(${currentTiltX}deg) rotateX(${-currentTiltY}deg)`;
                userPhoto.style.transform = `translate3d(${-currentTiltX * 0.7}px, ${-currentTiltY * 0.7}px, 0)`;
            }
            requestAnimationFrame(animateTilt);
        }
        animateTilt();
    </script>
</body>
</html>
