<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Выпадайло v1.2</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0d0614;
            --card-bg: #160d26;
            --accent-glow: #00ffff;
            --pink-accent: #ff007f;
            --purple-accent: #a824e8;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(135deg, #090310 0%, #1a082b 50%, #0d0317 100%);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); /* Поддержка челок/iOS */
            overflow: hidden;
            perspective: 1200px; /* Усиленная перспектива для 3D наклона */
            position: relative;
        }

        /* Глубокое фоновое неоновое свечение */
        .bg-glow-main {
            position: absolute;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(168, 36, 232, 0.35) 0%, rgba(255, 0, 127, 0.2) 45%, transparent 75%);
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(55px);
            animation: pulseGlow 5s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.85); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.25); opacity: 1; }
        }

        /* --- ЭКРАН 1: ВСТУПИТЕЛЬНЫЙ --- */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            z-index: 2;
            text-align: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .welcome-screen.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            display: none !important;
        }

        .welcome-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--pink-accent), var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 35px rgba(0, 255, 255, 0.6), 0 0 50px rgba(255, 0, 127, 0.5);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .welcome-subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 45px;
        }

        .btn-start-main {
            width: 85%;
            max-width: 280px;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 0, 126, 0.5), 0 0 20px rgba(168, 36, 232, 0.4);
            transition: transform 0.15s, box-shadow 0.2s;
        }

        .btn-start-main:active {
            transform: scale(0.95);
        }

        /* Версия только на первом экране, слева снизу */
        .version-start {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        /* --- ЭКРАН 2: ИГРОВОЙ ИНТЕРФЕЙС / РЕЗУЛЬТАТЫ --- */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            flex: 1;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .game-screen.active {
            display: flex;
            opacity: 1;
        }

        .header-mini {
            text-align: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        /* ПЕРЕЛИВАЮЩИЙСЯ ЗАГОЛОВОК ЗАГРУЗИ ФОТО */
        .header-mini h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #e6007e 0%, #a824e8 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: textGlowFlow 4s linear infinite;
        }

        @keyframes textGlowFlow {
            0% { background-position: 0% center; text-shadow: 0 0 10px rgba(230, 0, 126, 0.5); }
            50% { background-position: 100% center; text-shadow: 0 0 10px rgba(168, 36, 232, 0.5); }
            100% { background-position: 0% center; text-shadow: 0 0 10px rgba(230, 0, 126, 0.5); }
        }

        /* 3D Карточка (По умолчанию НАКЛОНОВ НЕТ) */
        .card-container {
            width: 280px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.06s ease-out; /* Ускоренная реакция для наклона */
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Состояние РЕЗУЛЬТАТЫ (Активные наклоны) */
        .card-container.results {
            will-change: transform;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 25px rgba(168, 36, 232, 0.3);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Внутренняя перспектива для параллакса фото */
            perspective: 600px;
        }

        /* Контейнер для параллакса внутри карточки */
        .photo-inner-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            position: relative;
        }

        .card img {
            width: 110%; /* Больше для параллакса */
            height: 110%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: -5%;
            left: -5%;
            /* По умолчанию параллакса нет */
        }

        /* Фото при РЕЗУЛЬТАТАХ (Слабый параллакс) */
        .card-container.results img {
            will-change: transform;
            transition: transform 0.06s ease-out; /* Плавный параллакс */
        }

        /* ЗОНА ВЫБОРА ФОТО (Пунктир) */
        .placeholder {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            padding: 35px;
            background: rgba(168, 36, 232, 0.08);
            border: 2.5px dashed rgba(168, 36, 232, 0.6);
            border-radius: 20px;
            cursor: pointer;
            width: 90%;
            height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            z-index: 2;
        }

        .placeholder:active {
            background: rgba(168, 36, 232, 0.15);
            border-color: var(--pink-accent);
        }

        .placeholder-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .placeholder p {
            font-size: 15px;
            font-weight: 500;
        }

        /* ВОССТАНОВЛЕННЫЙ ЯРКИЙ БЛИК (Glint) */
        .glint {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            border-radius: 24px;
            z-index: 3;
            transition: opacity 0.2s, background 0.06s ease-out;
            opacity: 0; /* Скрыт, пока фото не загружено */
        }

        /* Показываем блик в результатах */
        .card-container.results .glint {
            opacity: 1;
        }

        /* Анимация вылетающих кубиков🎲 */
        .dice-particle {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: flyDice 0.6s ease-out forwards;
        }

        @keyframes flyDice {
            0% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(1.6);
            }
        }

        /* Фильтры стилей */
        .filter-cyberpunk { filter: contrast(1.35) saturate(1.9) hue-rotate(-20deg); }
        .filter-matrix { filter: sepia(1) hue-rotate(80deg) saturate(3.5) contrast(1.25); }
        .filter-retro { filter: sepia(0.45) contrast(1.15) brightness(0.9) saturate(1.4); }
        .filter-neon { filter: invert(0.12) hue-rotate(180deg) saturate(2.2); }
        .filter-noir { filter: grayscale(1) contrast(1.9) brightness(0.75); }
        .filter-gold { filter: sepia(0.85) saturate(2.8) contrast(1.25) brightness(1.15); }

        .controls {
            width: 100%;
            max-width: 280px;
            margin-bottom: 5px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-spin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(45deg, var(--purple-accent), var(--pink-accent));
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.45);
            transition: transform 0.1s;
        }

        .btn-spin:active {
            transform: scale(0.95);
        }

        .btn-spin:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* КНОПКА ЗАНОВО */
        .btn-reset {
            display: none; /* Скрыта по умолчанию */
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .btn-reset:active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-reset.show {
            display: block;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="bg-glow-main"></div>

    <!-- ЭКРАН 1: Приветствие -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-title">ВЫПАДАЙЛО</div>
        <div class="welcome-subtitle">испытай удачу</div>
        <button class="btn-start-main" id="startMainBtn">Начать</button>
        <!-- Версия ТОЛЬКО здесь -->
        <div class="version-start">Выпадайло v1.2</div>
    </div>

    <!-- ЭКРАН 2: Игра / Результаты -->
    <div class="game-screen" id="gameScreen">
        <div class="header-mini">
            <h1 id="gameHeader">ЗАГРУЗИ ФОТО</h1>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="card" id="card">
                <div class="glint" id="glint"></div>
                <div class="photo-inner-wrapper">
                    <img id="userPhoto" alt="Photo">
                </div>
                <!-- Зона загрузки -->
                <div class="placeholder" id="placeholder">
                    <p><span class="placeholder-icon">📸</span> Выберите фото из галереи</p>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-spin" id="spinBtn">🎲 Крутить рулетку</button>
            <!-- Кнопка ЗАНОВО -->
            <button class="btn-reset" id="resetBtn">Заново</button>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <script>
        // Инициализация SDK
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const welcomeScreen = document.getElementById('welcomeScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startMainBtn = document.getElementById('startMainBtn');
        const gameHeader = document.getElementById('gameHeader');

        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fileInput = document.getElementById('fileInput');
        const userPhoto = document.getElementById('userPhoto');
        const placeholder = document.getElementById('placeholder');
        const cardContainer = document.getElementById('cardContainer');
        const card = document.getElementById('card');
        const glint = document.getElementById('glint');

        let isPhotoLoaded = false;
        let isResultsMode = false; // Режим результатов (для гироскопа)
        let audioCtx = null;

        const filters = [
            'filter-cyberpunk',
            'filter-matrix',
            'filter-retro',
            'filter-neon',
            'filter-noir',
            'filter-gold'
        ];

        // Клик по пунктиру открывает выбор файла
        placeholder.addEventListener('click', () => {
            fileInput.click();
        });

        // ВОССТАНОВЛЕННЫЙ ЗВУК ПРИ СТАРТЕ
        function playStartSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            // Победный аккорд
            osc.frequency.setValueAtTime(440, now); // A4
            osc.frequency.setValueAtTime(554.37, now + 0.1); // C#5
            osc.frequency.setValueAtTime(659.25, now + 0.2); // E5
            osc.frequency.setValueAtTime(880, now + 0.3); // A5
            
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.5);
        }

        // Кнопка НАЧАТЬ
        startMainBtn.addEventListener('click', () => {
            initAudio();
            playStartSound(); // Играем звук при нажатии «Начать»
            welcomeScreen.classList.add('hidden');
            setTimeout(() => {
                gameScreen.classList.add('active');
            }, 200);
        });

        // Кнопка ЗАНОВО
        resetBtn.addEventListener('click', () => {
            // Сброс всего состояния
            gameScreen.classList.remove('active');
            welcomeScreen.classList.remove('hidden');
            gameHeader.innerText = 'ЗАГРУЗИ ФОТО';
            isPhotoLoaded = false;
            isResultsMode = false;
            cardContainer.classList.remove('results');
            userPhoto.src = '';
            userPhoto.style.display = 'none';
            userPhoto.style.transform = 'translate3d(0, 0, 0)'; // Сброс параллакса
            placeholder.style.display = 'flex';
            card.className = 'card';
            spinBtn.innerText = '🎲 Крутить рулетку';
            spinBtn.disabled = false;
            resetBtn.classList.remove('show');
            fileInput.value = ''; // Сброс выбора файла
            cardContainer.style.transform = 'rotateY(0deg) rotateX(0deg)'; // Сброс 3D наклона
        });

        // Инициализация аудио
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Щелчки рулетки
        function playTickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1300, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        // Вылет кубиков🎲
        function spawnDice() {
            const dice = document.createElement('div');
            dice.className = 'dice-particle';
            dice.innerText = '🎲';
            
            const dx = (Math.random() - 0.5) * 250 + 'px';
            const dy = (Math.random() - 0.5) * 250 + 'px';
            dice.style.setProperty('--dx', dx);
            dice.style.setProperty('--dy', dy);
            
            dice.style.left = '50%';
            dice.style.top = '50%';

            cardContainer.appendChild(dice);

            setTimeout(() => {
                dice.remove();
            }, 600);
        }

        // Главная кнопка
        spinBtn.addEventListener('click', () => {
            initAudio();
            if (!isPhotoLoaded) {
                fileInput.click();
            } else {
                startRoulette();
            }
        });

        // Загрузка фото
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userPhoto.src = event.target.result;
                    userPhoto.style.display = 'block';
                    placeholder.style.display = 'none';
                    isPhotoLoaded = true;
                    startRoulette();
                };
                reader.readAsDataURL(file);
            }
        });

        // Рулетка
        function startRoulette() {
            spinBtn.disabled = true;
            resetBtn.classList.remove('show'); // Скрываем "Заново" при крутке
            isResultsMode = false;
            cardContainer.classList.remove('results');
            gameHeader.innerText = 'ВЫПАДАЙЛО';

            let speed = 40;
            let ticks = 0;
            const maxTicks = 22 + Math.floor(Math.random() * 8);

            function roll() {
                const randomFilter = filters[Math.floor(Math.random() * filters.length)];
                // Оптимизация: меняем только класс фильтра
                card.className = 'card ' + randomFilter;
                
                playTickSound();
                spawnDice(); // Вылет кубика🎲

                ticks++;
                if (ticks < maxTicks) {
                    speed += 14;
                    setTimeout(roll, speed);
                } else {
                    finishRoulette();
                }
            }

            roll();
        }

        // Конец рулетки
        function finishRoulette() {
            spinBtn.disabled = false;
            spinBtn.innerText = '🎲 Прокрутить ещё раз';
            resetBtn.classList.add('show'); // Показываем кнопку ЗАНОВО
            
            // АКТИВИРУЕМ РЕЖИМ РЕЗУЛЬТАТОВ (Наклоны и Блик)
            isResultsMode = true;
            cardContainer.classList.add('results');

            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 80,
                    spread: 70,
                    origin: { y: 0.65 }
                });
            }
        }

        // ГИРОСКОП: Усиленный 3D Наклон Карточки, Ослабленный ПАРАЛЛАКС ФОТО и БЛИК
        // Работает ТОЛЬКО в режиме результатов!
        window.addEventListener('deviceorientation', (e) => {
            if (!isResultsMode || !e.gamma || !e.beta) {
                // Если не результаты, карточка стоит прямо
                cardContainer.style.transform = 'rotateY(0deg) rotateX(0deg)';
                return;
            }
            
            // Расчет наклонов
            const tiltX = Math.max(-15, Math.min(15, e.gamma / 2.0)); // Усиленная реакция по X
            const tiltY = Math.max(-15, Math.min(15, (e.beta - 40) / 2.0)); // Усиленная реакция по Y
            
            // 1. УСИЛЕННЫЙ Наклон самой карточки (3D)
            // Прямо "играет" в руках
            cardContainer.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
            
            // 2. ОСЛАБЛЕННЫЙ ВНУТРЕННИЙ ПАРАЛЛАКС
            // Фото смещается совсем чуть-чуть
            userPhoto.style.transform = `translate3d(${-tiltX * 0.6}px, ${-tiltY * 0.6}px, 0)`;

            // 3. БЛИК (Glint) Реагирует на наклон
            glint.style.background = `linear-gradient(${135 + tiltX}deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 40%, rgba(255,255,255,0) 70%)`;
        });
    </script>
</body>
</html>
