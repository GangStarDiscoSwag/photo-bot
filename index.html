<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Выпадайло v1.2.5</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* [BLOCK_1: ROOT & BODY] */
        :root {
            --bg-color: #0d0614;
            --card-bg: #160d26;
            --accent-glow: #00ffff;
            --pink-accent: #ff007f;
            --purple-accent: #a824e8;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #120524;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            overflow: hidden;
            perspective: 1000px;
            position: relative;
        }

        /* [BLOCK_2: BG GLOW] */
        .bg-glow-main {
            position: fixed;
            width: 300vw;
            height: 300vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(168, 36, 232, 0.6) 0%, rgba(255, 0, 127, 0.4) 40%, #120524 75%),
                        conic-gradient(from 0deg, #a824e8, #ff007f, #00ffff, #a824e8);
            z-index: 0;
            pointer-events: none;
            filter: blur(25px);
            opacity: 0.85;
            animation: rotateBg 15s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* [BLOCK_3: WELCOME SCREEN] */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            z-index: 2;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .welcome-screen.hidden { display: none !important; }

        .welcome-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff007f 0%, #00ffff 50%, #ff007f 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 6px;
            animation: textGlowFlow 3s linear infinite;
            filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
        }

        .welcome-subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 45px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 10px rgba(168, 36, 232, 0.5);
        }

        .btn-start-main {
            width: 85%;
            max-width: 280px;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 0, 126, 0.5), 0 0 20px rgba(168, 36, 232, 0.4);
            transition: transform 0.15s;
        }

        .btn-start-main:active { transform: scale(0.95); }

        .version-start {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        /* [BLOCK_4: GAME SCREEN & UPLOAD] */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
            z-index: 2;
            gap: 25px;
        }

        .game-screen.active { display: flex; }

        .header-title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #e6007e 0%, #a824e8 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: textGlowFlow 4s linear infinite;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.8));
        }

        @keyframes textGlowFlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .upload-box {
            width: 90%;
            max-width: 320px;
            height: 90px;
            background: rgba(26, 12, 42, 0.6);
            border: 2px dashed rgba(168, 36, 232, 0.8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168, 36, 232, 0.2);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .upload-box:active {
            transform: scale(0.98);
            background: rgba(168, 36, 232, 0.2);
        }

        .upload-box p {
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* [BLOCK_5: CARD & NEON GLOW] */
        .card-container {
            width: 270px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            display: none;
            margin-bottom: 5px;
            will-change: transform;
        }

        .card-neon-glow {
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: #adddff;
            filter: blur(14px);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(173, 221, 255, 0.7);
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 2px solid #adddff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .card img {
            width: 112%;
            height: 112%;
            object-fit: cover;
            position: absolute;
            top: -6%;
            left: -6%;
            will-change: transform;
        }

        /* Глитч-анимация при объявлении результатов */
        .card.glitch-active img {
            animation: glitchFx 0.35s ease-in-out;
        }

        @keyframes glitchFx {
            0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1.8) contrast(1.5); }
            20% { transform: translate3d(-6px, 4px, 0) scale(1.03); filter: hue-rotate(90deg) brightness(2); }
            40% { transform: translate3d(6px, -4px, 0) scale(0.98); filter: invert(0.2) contrast(2); }
            60% { transform: translate3d(-4px, -2px, 0) scale(1.02); }
            80% { transform: translate3d(3px, 2px, 0) scale(1.01); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }

        .glint {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.08) 40%, transparent 65%);
            pointer-events: none;
            z-index: 3;
            border-radius: 24px;
        }

        .dice-particle {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: flyDice 0.6s ease-out forwards;
        }

        @keyframes flyDice {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(1.6); }
        }

        /* --- Фильтры --- */
        .filter-cyberpunk { filter: contrast(1.35) saturate(1.9) hue-rotate(-20deg); }
        .filter-matrix { filter: sepia(1) hue-rotate(80deg) saturate(3.5) contrast(1.25); }
        .filter-retro { filter: sepia(0.45) contrast(1.15) brightness(0.9) saturate(1.4); }
        .filter-neon { filter: invert(0.12) hue-rotate(180deg) saturate(2.2); }
        .filter-noir { filter: grayscale(1) contrast(1.9) brightness(0.75); }
        .filter-gold { filter: sepia(0.85) saturate(2.8) contrast(1.25) brightness(1.15); }
        .filter-red-noir { filter: grayscale(1) contrast(2.2) brightness(0.85) drop-shadow(0 0 1px #ff0033) hue-rotate(-50deg); }
        .filter-cyber-purple { filter: contrast(1.4) saturate(2.5) hue-rotate(90deg) brightness(0.9); }
        .filter-amber { filter: sepia(0.9) saturate(3.2) hue-rotate(-30deg) contrast(1.3); }

        /* [BLOCK_6: CONTROLS] */
        .controls {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }

        .btn-spin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.45);
            transition: transform 0.1s;
        }

        .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-reset {
            display: none;
            width: 100%;
            padding: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reset:active { background: rgba(255, 255, 255, 0.12); color: #fff; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="bg-glow-main"></div>

    <!-- [BLOCK_7: MARKUP HTML] -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-title">ВЫПАДАЙЛО</div>
        <div class="welcome-subtitle">испытай удачу</div>
        <button class="btn-start-main" id="startMainBtn">Начать</button>
        <div class="version-start">Выпадайло v1.2.5</div>
    </div>

    <div class="game-screen" id="gameScreen">
        <div class="header-title" id="gameHeader">ЗАГРУЗИ ФОТО</div>

        <div class="upload-box" id="uploadBox">
            <p>📸 Выберите фото из галереи</p>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="card-neon-glow"></div>
            <div class="card" id="card">
                <div class="glint" id="glint"></div>
                <img id="userPhoto" alt="Photo">
            </div>
        </div>

        <div class="controls" id="controlsBox" style="display: none;">
            <button class="btn-spin" id="spinBtn">🎲 Крутить рулетку</button>
            <button class="btn-reset" id="resetBtn">Заново</button>
        </div>

        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- [BLOCK_8: JS LOGIC] -->
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { 
            tg.ready(); 
            tg.expand();
            if (tg.lockOrientation) { tg.lockOrientation(); }
        }

        // Хелпер для Haptic Feedback с фоллбеком на Vibration API
        function triggerHaptic(type, style = 'light') {
            // 1. Пробуем Telegram WebApp API
            if (tg?.HapticFeedback) {
                if (type === 'impact') {
                    tg.HapticFeedback.impactOccurred(style);
                    return;
                } else if (type === 'notification') {
                    tg.HapticFeedback.notificationOccurred(style);
                    return;
                }
            }

            // 2. Запасной вариант (Стандартный браузерный Vibration API)
            if (navigator.vibrate) {
                if (type === 'impact') {
                    const duration = style === 'heavy' ? 30 : (style === 'medium' ? 20 : 10);
                    navigator.vibrate(duration);
                } else if (type === 'notification') {
                    navigator.vibrate([40, 50, 40]);
                }
            }
        }

        const welcomeScreen = document.getElementById('welcomeScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startMainBtn = document.getElementById('startMainBtn');
        const gameHeader = document.getElementById('gameHeader');
        const uploadBox = document.getElementById('uploadBox');
        const cardContainer = document.getElementById('cardContainer');
        const controlsBox = document.getElementById('controlsBox');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fileInput = document.getElementById('fileInput');
        const userPhoto = document.getElementById('userPhoto');
        const card = document.getElementById('card');
        const glint = document.getElementById('glint');

        let isPhotoLoaded = false;
        let audioCtx = null;
        let isSpinning = false;

        const filters = [
            'filter-cyberpunk', 
            'filter-matrix', 
            'filter-retro', 
            'filter-neon', 
            'filter-noir', 
            'filter-gold',
            'filter-red-noir',
            'filter-cyber-purple',
            'filter-amber'
        ];

        let lastFilterIndex = -1;

        function getNextFilter() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * filters.length);
            } while (randomIndex === lastFilterIndex && filters.length > 1);
            
            lastFilterIndex = randomIndex;
            return filters[randomIndex];
        }

        uploadBox.addEventListener('click', () => {
            triggerHaptic('impact', 'light');
            fileInput.click();
        });

        function playStartSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.setValueAtTime(659.25, now + 0.15);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(now + 0.45);
        }

        startMainBtn.addEventListener('click', () => {
            initAudio();
            playStartSound();
            triggerHaptic('impact', 'medium');
            welcomeScreen.classList.add('hidden');
            gameScreen.classList.add('active');
        });

        resetBtn.addEventListener('click', () => {
            triggerHaptic('impact', 'light');
            if (typeof confetti === 'function' && confetti.reset) {
                confetti.reset();
            }

            gameScreen.classList.remove('active');
            welcomeScreen.classList.remove('hidden');
            gameHeader.innerText = 'ЗАГРУЗИ ФОТО';
            uploadBox.style.display = 'flex';
            cardContainer.style.display = 'none';
            controlsBox.style.display = 'none';
            resetBtn.style.display = 'none';
            isPhotoLoaded = false;
            isSpinning = false;
            userPhoto.src = '';
            fileInput.value = '';
            card.className = 'card';
            lastFilterIndex = -1;
        });

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playWinSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'triangle';
            osc1.frequency.setValueAtTime(523.25, now);
            gain1.gain.setValueAtTime(0.15, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.3);

            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(783.99, now + 0.15);
            gain2.gain.setValueAtTime(0.15, now + 0.15);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now + 0.15);
            osc2.stop(now + 0.6);
        }

        function spawnDice() {
            const dice = document.createElement('div');
            dice.className = 'dice-particle';
            dice.innerText = '🎲';
            const dx = (Math.random() - 0.5) * 240 + 'px';
            const dy = (Math.random() - 0.5) * 240 + 'px';
            dice.style.setProperty('--dx', dx);
            dice.style.setProperty('--dy', dy);
            dice.style.left = '50%';
            dice.style.top = '50%';
            cardContainer.appendChild(dice);
            setTimeout(() => dice.remove(), 600);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userPhoto.src = event.target.result;
                    uploadBox.style.display = 'none';
                    cardContainer.style.display = 'block';
                    controlsBox.style.display = 'flex';
                    isPhotoLoaded = true;
                    startRoulette();
                };
                reader.readAsDataURL(file);
            }
        });

        spinBtn.addEventListener('click', () => {
            initAudio();
            triggerHaptic('impact', 'medium');
            if (isPhotoLoaded && !isSpinning) startRoulette();
        });

        function startRoulette() {
            isSpinning = true;
            spinBtn.disabled = true;
            resetBtn.style.display = 'none';
            gameHeader.innerText = 'ВЫПАДАЙЛО';
            card.classList.remove('glitch-active');

            if (typeof confetti === 'function' && confetti.reset) {
                confetti.reset();
            }

            let speed = 40;
            let ticks = 0;
            const maxTicks = 22 + Math.floor(Math.random() * 8);

            function roll() {
                const nextFilter = getNextFilter();
                card.className = 'card ' + nextFilter;
                playTickSound();
                triggerHaptic('impact', 'light');
                spawnDice();

                ticks++;
                if (ticks < maxTicks) {
                    speed += 14;
                    setTimeout(roll, speed);
                } else {
                    finishRoulette();
                }
            }
            roll();
        }

        function finishRoulette() {
            isSpinning = false;
            spinBtn.disabled = false;
            resetBtn.style.display = 'block';
            gameHeader.innerText = 'ТВОЙ СТИЛЬ!';

            card.classList.add('glitch-active');
            playWinSound();
            triggerHaptic('notification', 'success');

            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 70,
                    spread: 60,
                    origin: { y: 0.7 }
                });
            }
        }
    </script>
</body>
</html>
