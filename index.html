<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Выпадайло</title>

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* [BLOCK_1: ROOT & BODY] */
        :root {
            --bg-color: #0d0614;
            --card-bg: #160d26;
            --accent-glow: #00ffff;
            --pink-accent: #ff007f;
            --purple-accent: #a824e8;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: #120524;
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            overflow: hidden;
            perspective: 1000px;
            position: relative;
        }

        /* [BLOCK_2: BG GLOW] */
        .bg-glow-main {
            position: fixed;
            width: 300vw;
            height: 300vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(168, 36, 232, 0.6) 0%, rgba(255, 0, 127, 0.4) 40%, #120524 75%),
                        conic-gradient(from 0deg, #a824e8, #ff007f, #00ffff, #a824e8);
            z-index: 0;
            pointer-events: none;
            filter: blur(25px);
            opacity: 0.85;
            animation: rotateBg 15s linear infinite;
        }

        @keyframes rotateBg {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* [BLOCK_3: WELCOME SCREEN] */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            z-index: 2;
            text-align: center;
            transition: opacity 0.3s ease;
        }

        .welcome-screen.hidden { display: none !important; }

        .welcome-title {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff007f 0%, #00ffff 50%, #ff007f 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 6px;
            animation: textGlowFlow 3s linear infinite;
            filter: drop-shadow(0 0 12px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
        }

        .welcome-subtitle {
            font-size: 14px;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 45px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 10px rgba(168, 36, 232, 0.5);
        }

        .btn-start-main {
            width: 85%;
            max-width: 280px;
            padding: 18px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(230, 0, 126, 0.5), 0 0 20px rgba(168, 36, 232, 0.4);
            transition: transform 0.15s;
        }

        .btn-start-main:active { transform: scale(0.95); }

        .version-start {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        /* [BLOCK_4: GAME SCREEN & UPLOAD] */
        .game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex: 1;
            z-index: 2;
            gap: 25px;
        }

        .game-screen.active { display: flex; }

        .header-title {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, #e6007e 0%, #a824e8 50%, #00ffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            animation: textGlowFlow 4s linear infinite;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.8));
            padding: 0 10px;
        }

        @keyframes textGlowFlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        .upload-box {
            width: 90%;
            max-width: 320px;
            height: 90px;
            background: rgba(26, 12, 42, 0.6);
            border: 2px dashed rgba(168, 36, 232, 0.8);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(168, 36, 232, 0.2);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .upload-box:active {
            transform: scale(0.98);
            background: rgba(168, 36, 232, 0.2);
        }

        .upload-box p {
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* [BLOCK_5: CARD & NEON GLOW WITH 3D] */
        .card-container {
            width: 270px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            display: none;
            margin-bottom: 5px;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        .card-neon-glow {
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: #adddff;
            filter: blur(14px);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
            box-shadow: 0 0 30px rgba(173, 221, 255, 0.7);
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            border: 2px solid #adddff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .card img {
            width: 112%;
            height: 112%;
            object-fit: cover;
            position: absolute;
            top: -6%;
            left: -6%;
            will-change: transform;
        }

        .card.glitch-active img {
            animation: glitchFx 0.35s ease-in-out;
        }

        @keyframes glitchFx {
            0% { transform: translate3d(0, 0, 0) scale(1); filter: brightness(1.8) contrast(1.5); }
            20% { transform: translate3d(-6px, 4px, 0) scale(1.03); filter: hue-rotate(90deg) brightness(2); }
            40% { transform: translate3d(6px, -4px, 0) scale(0.98); filter: invert(0.2) contrast(2); }
            60% { transform: translate3d(-4px, -2px, 0) scale(1.02); }
            80% { transform: translate3d(3px, 2px, 0) scale(1.01); }
            100% { transform: translate3d(0, 0, 0) scale(1); }
        }

        .glint {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.08) 40%, transparent 65%);
            pointer-events: none;
            z-index: 3;
            border-radius: 24px;
        }

        .dice-particle {
            position: absolute;
            font-size: 32px;
            pointer-events: none;
            z-index: 10;
            animation: flyDice 0.6s ease-out forwards;
        }

        @keyframes flyDice {
            0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(0.5); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(360deg) scale(1.6); }
        }

        /* --- Фильтры Цвета --- */
        .filter-cyberpunk { filter: contrast(1.35) saturate(1.9) hue-rotate(-20deg); }
        .filter-matrix { filter: sepia(1) hue-rotate(80deg) saturate(3.5) contrast(1.25); }
        .filter-retro { filter: sepia(0.45) contrast(1.15) brightness(0.9) saturate(1.4); }
        .filter-neon { filter: invert(0.12) hue-rotate(180deg) saturate(2.2); }
        .filter-noir { filter: grayscale(1) contrast(1.9) brightness(0.75); }
        .filter-gold { filter: sepia(0.85) saturate(2.8) contrast(1.25) brightness(1.15); }
        .filter-red-noir { filter: grayscale(1) contrast(2.2) brightness(0.85) drop-shadow(0 0 1px #ff0033) hue-rotate(-50deg); }
        .filter-cyber-purple { filter: contrast(1.4) saturate(2.5) hue-rotate(90deg) brightness(0.9); }
        .filter-amber { filter: sepia(0.9) saturate(3.2) hue-rotate(-30deg) contrast(1.3); }

        /* [BLOCK_6: CONTROLS] */
        .controls {
            width: 100%;
            max-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2;
        }

        .btn-spin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(90deg, #e6007e, #a824e8);
            color: #fff;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.45);
            transition: transform 0.1s;
        }

        .btn-spin:active { transform: scale(0.95); }
        .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-reset {
            display: none;
            width: 100%;
            padding: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-reset:active { background: rgba(255, 255, 255, 0.12); color: #fff; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="bg-glow-main" id="bgGlow"></div>

    <!-- [BLOCK_7: MARKUP HTML] -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-title">ВЫПАДАЙЛО</div>
        <div class="welcome-subtitle">испытай удачу</div>
        <button class="btn-start-main" id="startMainBtn">Начать</button>
        <div class="version-start">Выпадайло</div>
    </div>

    <div class="game-screen" id="gameScreen">
        <div class="header-title" id="gameHeader">ЗАГРУЗИ ФОТО</div>

        <div class="upload-box" id="uploadBox">
            <p>📸 Выберите фото из галереи</p>
        </div>

        <div class="card-container" id="cardContainer">
            <div class="card-neon-glow"></div>
            <div class="card" id="card">
                <div class="glint" id="glint"></div>
                <img id="userPhoto" alt="Photo">
            </div>
        </div>

        <div class="controls" id="controlsBox" style="display: none;">
            <button class="btn-spin" id="spinBtn">🎲 Крутить рулетку</button>
            <button class="btn-reset" id="resetBtn">Заново</button>
        </div>

        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- Скрытый холст для геометрических деформаций -->
    <canvas id="warpCanvas" style="display: none;"></canvas>

    <!-- [BLOCK_8: JS LOGIC] -->
    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { 
            tg.ready(); 
            tg.expand();
            if (tg.lockOrientation) { tg.lockOrientation(); }
        }

        const welcomeScreen = document.getElementById('welcomeScreen');
        const gameScreen = document.getElementById('gameScreen');
        const startMainBtn = document.getElementById('startMainBtn');
        const gameHeader = document.getElementById('gameHeader');
        const uploadBox = document.getElementById('uploadBox');
        const cardContainer = document.getElementById('cardContainer');
        const controlsBox = document.getElementById('controlsBox');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fileInput = document.getElementById('fileInput');
        const userPhoto = document.getElementById('userPhoto');
        const card = document.getElementById('card');
        const glint = document.getElementById('glint');
        const bgGlow = document.getElementById('bgGlow');
        const warpCanvas = document.getElementById('warpCanvas');

        let isPhotoLoaded = false;
        let audioCtx = null;
        let isSpinning = false;
        let currentWinningStyleKey = '';
        let originalImageObject = new Image();

        // Полная база стилей с русской локализацией названий
        const styles = [
            { id: 'filter-cyberpunk', name: 'КИБЕРПАНК 2077', type: 'color' },
            { id: 'filter-matrix', name: 'МАТРИЦА', type: 'color' },
            { id: 'filter-retro', name: 'РЕТРО ВАЙБ', type: 'color' },
            { id: 'filter-neon', name: 'НЕОНОВЫЙ ГЛЯНЕЦ', type: 'color' },
            { id: 'filter-noir', name: 'ТЕМНЫЙ НУАР', type: 'color' },
            { id: 'filter-gold', name: 'ЧИСТОЕ ЗОЛОТО', type: 'color' },
            { id: 'filter-red-noir', name: 'КРАСНЫЙ НУАР', type: 'color' },
            { id: 'filter-cyber-purple', name: 'КИБЕР ФИОЛЕТ', type: 'color' },
            { id: 'filter-amber', name: 'ЯНТАРНЫЙ СВЕТ', type: 'color' },
            { id: 'geo-fisheye', name: 'РЫБИЙ ГЛАЗ', type: 'geo', geoType: 'fisheye' },
            { id: 'geo-twirl', name: 'СПИРАЛЬНЫЙ ВИХРЬ', type: 'geo', geoType: 'twirl' },
            { id: 'geo-wave', name: 'ЖИДКАЯ ВОЛНА', type: 'geo', geoType: 'wave' },
            { id: 'geo-vortex', name: 'ЧЕРНАЯ ДЫРА', type: 'geo', geoType: 'vortex' }
        ];

        const bgGlowStyles = {
            'filter-cyberpunk': 'radial-gradient(circle, rgba(255, 0, 127, 0.7) 0%, rgba(0, 255, 255, 0.5) 45%, #120524 80%), conic-gradient(from 0deg, #ff007f, #00ffff, #ff007f)',
            'filter-matrix': 'radial-gradient(circle, rgba(0, 255, 65, 0.7) 0%, rgba(0, 50, 0, 0.6) 50%, #051405 80%), conic-gradient(from 0deg, #00ff41, #003b00, #00ff41)',
            'filter-retro': 'radial-gradient(circle, rgba(235, 130, 60, 0.7) 0%, rgba(120, 40, 140, 0.5) 50%, #17051a 80%), conic-gradient(from 0deg, #eb823c, #78288c, #eb823c)',
            'filter-neon': 'radial-gradient(circle, rgba(0, 100, 255, 0.7) 0%, rgba(180, 0, 255, 0.5) 50%, #050a24 80%), conic-gradient(from 0deg, #0064ff, #b400ff, #0064ff)',
            'filter-noir': 'radial-gradient(circle, rgba(180, 180, 180, 0.3) 0%, rgba(40, 40, 40, 0.6) 50%, #080808 80%), conic-gradient(from 0deg, #555, #111, #555)',
            'filter-gold': 'radial-gradient(circle, rgba(255, 215, 0, 0.7) 0%, rgba(255, 100, 0, 0.4) 50%, #1a1202 80%), conic-gradient(from 0deg, #ffd700, #ff6400, #ffd700)',
            'filter-red-noir': 'radial-gradient(circle, rgba(255, 0, 50, 0.75) 0%, rgba(20, 0, 0, 0.8) 50%, #100202 80%), conic-gradient(from 0deg, #ff0032, #200000, #ff0032)',
            'filter-cyber-purple': 'radial-gradient(circle, rgba(168, 36, 232, 0.8) 0%, rgba(0, 255, 255, 0.4) 50%, #120524 80%), conic-gradient(from 0deg, #a824e8, #00ffff, #a824e8)',
            'filter-amber': 'radial-gradient(circle, rgba(255, 160, 0, 0.75) 0%, rgba(100, 30, 0, 0.6) 50%, #1a0a02 80%), conic-gradient(from 0deg, #ffa000, #641e00, #ffa000)',
            'geo-fisheye': 'radial-gradient(circle, rgba(0, 255, 255, 0.8) 0%, rgba(0, 80, 255, 0.5) 50%, #020b1a 80%), conic-gradient(from 0deg, #00ffff, #0050ff, #00ffff)',
            'geo-twirl': 'radial-gradient(circle, rgba(255, 0, 200, 0.8) 0%, rgba(100, 0, 255, 0.5) 50%, #15021a 80%), conic-gradient(from 0deg, #ff00c8, #6400ff, #ff00c8)',
            'geo-wave': 'radial-gradient(circle, rgba(0, 255, 150, 0.8) 0%, rgba(0, 150, 255, 0.5) 50%, #021a12 80%), conic-gradient(from 0deg, #00ff96, #0096ff, #00ff96)',
            'geo-vortex': 'radial-gradient(circle, rgba(180, 0, 255, 0.8) 0%, rgba(20, 0, 40, 0.8) 50%, #05000a 80%), conic-gradient(from 0deg, #b400ff, #140028, #b400ff)',
            'default': 'radial-gradient(circle, rgba(168, 36, 232, 0.6) 0%, rgba(255, 0, 127, 0.4) 40%, #120524 75%), conic-gradient(from 0deg, #a824e8, #ff007f, #00ffff, #a824e8)'
        };

        let lastStyleIndex = -1;

        function getNextStyle() {
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * styles.length);
            } while (randomIndex === lastStyleIndex && styles.length > 1);
            
            lastStyleIndex = randomIndex;
            return styles[randomIndex];
        }

        /* --- [ГЕОМЕТРИЧЕСКИЕ ДЕФОРМАЦИИ CANVAS] --- */
        function applyGeometricTransform(type) {
            if (!originalImageObject.src) return;

            const ctx = warpCanvas.getContext('2d');
            const w = 400; 
            const h = 500;
            warpCanvas.width = w;
            warpCanvas.height = h;

            // Рисуем исходное фото
            ctx.drawImage(originalImageObject, 0, 0, w, h);
            const srcData = ctx.getImageData(0, 0, w, h);
            const dstData = ctx.createImageData(w, h);

            const src = srcData.data;
            const dst = dstData.data;
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) * 0.48;

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const dx = x - centerX;
                    const dy = y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    let srcX = x;
                    let srcY = y;

                    if (distance < radius) {
                        const normDist = distance / radius;

                        if (type === 'fisheye') {
                            // Рыбий глаз (Сферическая линза)
                            const factor = Math.sin(normDist * Math.PI / 2);
                            srcX = centerX + dx * factor;
                            srcY = centerY + dy * factor;
                        } else if (type === 'twirl') {
                            // Спиральный вихрь
                            const angle = (1 - normDist) * (1 - normDist) * 3.5;
                            const cosA = Math.cos(angle);
                            const sinA = Math.sin(angle);
                            srcX = centerX + (dx * cosA - dy * sinA);
                            srcY = centerY + (dx * sinA + dy * cosA);
                        } else if (type === 'wave') {
                            // Жидкая волна
                            srcX = x + Math.sin(y / 12) * 16 * (1 - normDist);
                            srcY = y + Math.cos(x / 12) * 16 * (1 - normDist);
                        } else if (type === 'vortex') {
                            // Втягивание в черную дыру
                            const factor = Math.pow(normDist, 2.2);
                            srcX = centerX + dx * factor;
                            srcY = centerY + dy * factor;
                        }
                    }

                    srcX = Math.max(0, Math.min(w - 1, Math.round(srcX)));
                    srcY = Math.max(0, Math.min(h - 1, Math.round(srcY)));

                    const dstIdx = (y * w + x) * 4;
                    const srcIdx = (srcY * w + srcX) * 4;

                    dst[dstIdx] = src[srcIdx];
                    dst[dstIdx + 1] = src[srcIdx + 1];
                    dst[dstIdx + 2] = src[srcIdx + 2];
                    dst[dstIdx + 3] = src[srcIdx + 3];
                }
            }

            ctx.putImageData(dstData, 0, 0);
            userPhoto.src = warpCanvas.toDataURL('image/jpeg', 0.92);
        }

        /* --- [3D НАКЛОНЫ КАРТОЧКИ] --- */
        function applyCardTilt(rotateX, rotateY) {
            const clampedX = Math.max(-28, Math.min(28, rotateX));
            const clampedY = Math.max(-28, Math.min(28, rotateY));
            
            cardContainer.style.transform = `rotateX(${clampedX}deg) rotateY(${clampedY}deg)`;
            userPhoto.style.transform = `translate3d(${-clampedY * 0.8}px, ${clampedX * 0.8}px, 0)`;
        }

        window.addEventListener('deviceorientation', (e) => {
            if (!isPhotoLoaded) return;
            const tiltX = (e.beta || 0) - 45;
            const tiltY = e.gamma || 0;
            applyCardTilt(-tiltX * 0.7, tiltY * 0.7);
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPhotoLoaded) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 50;
            const y = (e.clientY / window.innerHeight - 0.5) * -50;
            applyCardTilt(y, x);
        });

        uploadBox.addEventListener('click', () => {
            initAudio();
            fileInput.click();
        });

        /* --- [УЛЬТРА-ГРОМКИЙ ЗВУКОВОЙ ДВИЖОК х4] --- */
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playStartSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            [440, 880].forEach((freq) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.setValueAtTime(freq * 1.5, now + 0.12);
                
                gain.gain.setValueAtTime(1.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.4);
            });
        }

        function playTickSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            [1200, 2400].forEach((freq) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, now);
                
                gain.gain.setValueAtTime(0.32, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now);
                osc.stop(now + 0.04);
            });
        }

        function playWinSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const notes = [
                { freq: 523.25, time: 0, dur: 0.35 },
                { freq: 659.25, time: 0.1, dur: 0.35 },
                { freq: 783.99, time: 0.2, dur: 0.6 }
            ];

            notes.forEach(note => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(note.freq, now + note.time);
                
                gain.gain.setValueAtTime(1.2, now + note.time);
                gain.gain.exponentialRampToValueAtTime(0.001, now + note.time + note.dur);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start(now + note.time);
                osc.stop(now + note.time + note.dur);
            });
        }

        startMainBtn.addEventListener('click', () => {
            initAudio();
            playStartSound();
            welcomeScreen.classList.add('hidden');
            gameScreen.classList.add('active');
        });

        resetBtn.addEventListener('click', () => {
            if (typeof confetti === 'function' && confetti.reset) {
                confetti.reset();
            }

            gameScreen.classList.remove('active');
            welcomeScreen.classList.remove('hidden');
            gameHeader.innerText = 'ЗАГРУЗИ ФОТО';
            uploadBox.style.display = 'flex';
            cardContainer.style.display = 'none';
            controlsBox.style.display = 'none';
            resetBtn.style.display = 'none';
            isPhotoLoaded = false;
            isSpinning = false;
            userPhoto.src = '';
            fileInput.value = '';
            card.className = 'card';
            bgGlow.style.background = bgGlowStyles['default'];
            cardContainer.style.transform = 'rotateX(0deg) rotateY(0deg)';
            lastStyleIndex = -1;
        });

        function spawnDice() {
            const dice = document.createElement('div');
            dice.className = 'dice-particle';
            dice.innerText = '🎲';
            const dx = (Math.random() - 0.5) * 240 + 'px';
            const dy = (Math.random() - 0.5) * 240 + 'px';
            dice.style.setProperty('--dx', dx);
            dice.style.setProperty('--dy', dy);
            dice.style.left = '50%';
            dice.style.top = '50%';
            cardContainer.appendChild(dice);
            setTimeout(() => dice.remove(), 600);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    originalImageObject = new Image();
                    originalImageObject.onload = () => {
                        userPhoto.src = originalImageObject.src;
                        uploadBox.style.display = 'none';
                        cardContainer.style.display = 'block';
                        controlsBox.style.display = 'flex';
                        isPhotoLoaded = true;
                        startRoulette();
                    };
                    originalImageObject.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        spinBtn.addEventListener('click', () => {
            initAudio();
            if (isPhotoLoaded && !isSpinning) startRoulette();
        });

        function startRoulette() {
            isSpinning = true;
            spinBtn.disabled = true;
            resetBtn.style.display = 'none';
            gameHeader.innerText = 'ВЫПАДАЙЛО';
            card.classList.remove('glitch-active');

            // Восстанавливаем оригинальную картинку перед новой круткой
            userPhoto.src = originalImageObject.src;
            bgGlow.style.background = bgGlowStyles['default'];

            if (typeof confetti === 'function' && confetti.reset) {
                confetti.reset();
            }

            let speed = 40;
            let ticks = 0;
            const maxTicks = 22 + Math.floor(Math.random() * 8);

            function roll() {
                const selectedStyle = getNextStyle();
                currentWinningStyleKey = selectedStyle.id;

                if (selectedStyle.type === 'color') {
                    card.className = 'card ' + selectedStyle.id;
                } else {
                    card.className = 'card';
                }

                playTickSound();
                spawnDice();

                ticks++;
                if (ticks < maxTicks) {
                    speed += 14;
                    setTimeout(roll, speed);
                } else {
                    finishRoulette(selectedStyle);
                }
            }
            roll();
        }

        function finishRoulette(finalStyle) {
            isSpinning = false;
            spinBtn.disabled = false;
            resetBtn.style.display = 'block';

            // Устанавливаем русское название выпавшего стиля в заголовок!
            gameHeader.innerText = finalStyle.name;

            if (finalStyle.type === 'geo') {
                applyGeometricTransform(finalStyle.geoType);
            }

            if (bgGlowStyles[finalStyle.id]) {
                bgGlow.style.background = bgGlowStyles[finalStyle.id];
            }

            card.classList.add('glitch-active');
            playWinSound();

            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 70,
                    spread: 60,
                    origin: { y: 0.7 }
                });
            }
        }
    </script>
</body>
</html>
