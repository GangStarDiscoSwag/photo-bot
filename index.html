<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Выпадайло v1.2</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13;
            --card-bg: #1a1a24;
            --accent-color: #8a2be2;
            --accent-glow: #00ffff;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            overflow: hidden;
            perspective: 1000px;
        }

        .header {
            text-align: center;
            margin-top: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(45deg, #ff007f, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        /* 3D-Карточка с гироскопом */
        .card-container {
            width: 280px;
            height: 380px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            margin: 20px 0;
        }

        .card {
            width: 100%;
            height: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 15px rgba(138, 43, 226, 0.2);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .placeholder {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .placeholder-icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: block;
        }

        /* Блик от света (Glint) */
        .glint {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 60%);
            pointer-events: none;
            border-radius: 20px;
        }

        /* Фильтры стилей */
        .filter-cyberpunk { filter: contrast(1.3) saturate(1.8) hue-rotate(-20deg); }
        .filter-matrix { filter: sepia(1) hue-rotate(80deg) saturate(3) contrast(1.2); }
        .filter-retro { filter: sepia(0.4) contrast(1.1) brightness(0.9) saturate(1.3); }
        .filter-neon { filter: invert(0.1) hue-rotate(180deg) saturate(2); }
        .filter-noir { filter: grayscale(1) contrast(1.8) brightness(0.8); }
        .filter-gold { filter: sepia(0.8) saturate(2.5) contrast(1.2) brightness(1.1); }

        /* Кнопка рулетки */
        .controls {
            width: 100%;
            max-width: 280px;
            margin-bottom: 10px;
        }

        .btn-spin {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(45deg, #8a2be2, #ff007f);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 0, 127, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-spin:active {
            transform: scale(0.96);
        }

        .btn-spin:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="file"] {
            display: none;
        }

        .footer-version {
            font-size: 11px;
            color: #444;
            align-self: flex-end;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ВЫПАДАЙЛО</h1>
    </div>

    <div class="card-container" id="cardContainer">
        <div class="card" id="card">
            <div class="glint"></div>
            <div class="placeholder" id="placeholder">
                <span class="placeholder-icon">🎰</span>
                <p>Нажми кнопку ниже,<br>чтобы загрузить фото</p>
            </div>
            <img id="userPhoto" alt="Photo">
        </div>
    </div>

    <div class="controls">
        <button class="btn-spin" id="spinBtn">🎲 Крутить рулетку</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="footer-version">Выпадайло v1.2</div>

    <script>
        // Инициализация Telegram WebApp сразу без задержек
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        const spinBtn = document.getElementById('spinBtn');
        const fileInput = document.getElementById('fileInput');
        const userPhoto = document.getElementById('userPhoto');
        const placeholder = document.getElementById('placeholder');
        const cardContainer = document.getElementById('cardContainer');
        const card = document.getElementById('card');

        let isPhotoLoaded = false;
        let audioCtx = null;

        const filters = [
            'filter-cyberpunk',
            'filter-matrix',
            'filter-retro',
            'filter-neon',
            'filter-noir',
            'filter-gold'
        ];

        // Инициализация звукового контекста при первом клике
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Простой звук щелчка рулетки
        function playTickSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        // Главная кнопка
        spinBtn.addEventListener('click', () => {
            initAudio();
            if (!isPhotoLoaded) {
                fileInput.click();
            } else {
                startRoulette();
            }
        });

        // Загрузка фото
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userPhoto.src = event.target.result;
                    userPhoto.style.display = 'block';
                    placeholder.style.display = 'none';
                    isPhotoLoaded = true;
                    startRoulette();
                };
                reader.readAsDataURL(file);
            }
        });

        // Вращение рулетки
        function startRoulette() {
            spinBtn.disabled = true;
            let speed = 50;
            let ticks = 0;
            const maxTicks = 20 + Math.floor(Math.random() * 10);

            function roll() {
                // Случайный фильтр
                const randomFilter = filters[Math.floor(Math.random() * filters.length)];
                card.className = 'card ' + randomFilter;
                playTickSound();

                ticks++;
                if (ticks < maxTicks) {
                    speed += 15; // Замедление
                    setTimeout(roll, speed);
                } else {
                    finishRoulette();
                }
            }

            roll();
        }

        // Завершение рулетки и салют
        function finishRoulette() {
            spinBtn.disabled = false;
            spinBtn.innerText = '🎲 Прокрутить ещё раз';

            // Конфетти
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 70,
                    spread: 60,
                    origin: { y: 0.7 }
                });
            }
        }

        // Плавный гироскоп (Tilt эффект)
        window.addEventListener('deviceorientation', (e) => {
            if (!e.gamma || !e.beta) return;
            const tiltX = Math.max(-15, Math.min(15, e.gamma / 2));
            const tiltY = Math.max(-15, Math.min(15, (e.beta - 40) / 2));
            cardContainer.style.transform = `rotateY(${tiltX}deg) rotateX(${-tiltY}deg)`;
        });
    </script>
</body>
</html>
